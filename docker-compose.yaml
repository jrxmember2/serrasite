version: "3.9"

services:
  serratech-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: serratech-site
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:/app/data/dev.db
      UPLOAD_DIR: /app/public/uploads
    volumes:
      - serratech_site_db:/app/data
      - serratech_site_uploads:/app/public/uploads

volumes:
  serratech_site_db:
  serratech_site_uploads:
